<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>My To-Do List</h1>
        <form id="add-todo-form">
            <input type="text" id="new-todo-input" placeholder="Add a new task..." required />
            <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>

        <hr />

        <div id="partnership-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xzdkzljn" method="POST" id="partnership-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required />
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required />
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="How can we work together?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
